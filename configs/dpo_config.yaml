model:
  sft_checkpoint: models/sft-phi3-v1
  output_dir: models/dpo-phi3-v1
  dtype: null                # auto (bfloat16 on Ampere+)

dpo:
  beta: 0.1                  # KL penalty weight
  max_length: 1024
  max_prompt_length: 512

training:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  learning_rate: 5.0e-5
  lr_scheduler_type: cosine
  logging_steps: 5
  evaluation_strategy: steps
  eval_steps: 20
  save_strategy: steps
  save_steps: 50
  save_total_limit: 2
  load_best_model_at_end: true
  report_to: none
  seed: 42

data:
  dpo_file: data/dataset/dpo_pairs.jsonl
  test_size: 0.1
